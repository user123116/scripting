<!DOCTYPE html>
<html>
<head>
    <title>Alert Example</title>
    <script>
        function showAlert() {
            alert("Hello! This alert is from embedded JavaScript.");
        }
    </script>
</head>
<body>

    <h2>Embedded JavaScript Example</h2>
    <button onclick="showAlert()">Click Me</button>

</body>
</html>
